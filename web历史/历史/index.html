<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>三星堆神树文物</title>
<script src="https://cdn.bootcdn.net/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<style>
*{margin:0;padding:0;list-style:none;text-decoration:none;box-sizing:border-box;}
body{background:#f5f2eb;font-family:"Microsoft Yahei",sans-serif;}
.header{background:#8c3b2e;height:60px;position:sticky;top:0;}
.nav{max-width:1100px;margin:0 auto;height:100%;display:flex;justify-content:center;}
.nav ul{display:flex;height:100%;}
.nav ul li{width:110px;text-align:center;line-height:60px;}
.nav ul li a{color:#fff;font-size:17px;}
.nav ul li a:hover{color:#ffd700;}
.main{max-width:1100px;margin:30px auto;padding:25px;background:#fff;border-radius:24px;box-shadow:0 8px 20px rgba(0,0,0,0.08);}
h1{text-align:center;color:#8c3b2e;margin-bottom:20px;font-size:1.9rem;}
.img-box{display:flex;flex-wrap:wrap;justify-content:center;gap:25px;margin:30px 0;}
.img-item{flex:1;min-width:210px;text-align:center;background:#fef7ef;padding:12px 8px;border-radius:20px;}
.bg-img{width:100%;max-width:240px;height:200px;margin:0 auto;border-radius:14px;border:3px solid #c77a5a;background-size:cover;background-position:center;background-repeat:no-repeat;background-color:#f0e3d8;}
.img-item p{margin-top:12px;font-weight:600;color:#5a2e23;background:#f4e5d8;display:inline-block;padding:4px 16px;border-radius:40px;}
.text-box{background:#fef7ef;padding:20px 26px;border-radius:28px;margin:20px 0;border-left:5px solid #8c3b2e;}
.text-box p{font-size:15px;line-height:1.75;color:#2d241e;text-indent:2em;margin:12px 0;}
.form-box{margin-top:35px;padding:20px 25px;background:#fefaf5;border-radius:30px;border-top:1px dashed #ddbc9b;}
.form-box h3{color:#8c3b2e;margin-bottom:18px;font-size:1.6rem;}
.form-box label{font-weight:600;color:#4e2a1f;width:70px;display:inline-block;}
.form-box input,.form-box textarea{margin:10px 0;padding:10px 14px;width:100%;max-width:400px;border:1px solid #ddbc9b;border-radius:40px;background:#fffcf8;outline:none;}
.form-box textarea{height:80px;border-radius:24px;}
#submitBtn{background:#8c3b2e;color:#fff;border:none;border-radius:40px;padding:8px 28px;font-size:1rem;font-weight:bold;cursor:pointer;margin-top:8px;}
#submitBtn:hover{background:#b04d3c;}
.footer{text-align:center;padding:20px;background:#e3d5c6;color:#5a3e30;margin-top:30px;font-size:0.85rem;}
@media (max-width:700px){.img-box{flex-direction:column;align-items:center;}.img-item{width:80%;}}
</style>
</head>
<body>
<div class="header">
  <div class="nav">
    <ul>
      <li><a href=" ">首页</a ></li>
      <li><a href="#intro">文物介绍</a ></li>
      <li><a href="#form">留言互动</a ></li>
      <li><a href="#">探索</a ></li>
    </ul>
  </div>
</div>
<div class="main">
  <h1>三星堆神树系列文物</h1>
  <div class="img-box">
    <div class="img-item">
      <div class="bg-img" style="background-image: url('image/qingtongshu1.jpg');"></div>
      <p>商·一号青铜神树</p >
    </div>
    <div class="img-item">
      <div class="bg-img" style="background-image: url('image/qingtongshu3.jpg');"></div>
      <p>商·三号青铜神树</p >
    </div>
    <div class="img-item">
      <div class="bg-img" style="background-image: url('image/yaoqianshu.jpg');"></div>
      <p>东汉·摇钱树</p >
    </div>
  </div>
  <div class="text-box" id="intro">
    <p>三星堆遗址出土的青铜神树与摇钱树，是古蜀文明最震撼的文物代表。一号、三号青铜神树出自商代祭祀坑，造型奇幻诡谲，神鸟栖息枝头，承载着古蜀先民的太阳崇拜与通天思想。</p >
    <p>东汉摇钱树延续了巴蜀神树信仰，鎏金镂空工艺精美绝伦，象征财富与祈福，见证了从商代到汉代，巴蜀地区千年不断的树神崇拜文化，是中华文明多元一体的绝佳见证。</p >
  </div>
  <div class="form-box" id="form">
    <h3>文物留言区</h3>
    <form>
      <label>姓名：</label>
      <input type="text" id="name" placeholder="请输入姓名"><br>
      <label>感想：</label>
      <textarea id="comment" placeholder="写下你对三星堆文物的感受"></textarea><br>
      <input type="button" value="提交" id="submitBtn">
    </form>
  </div>
</div>
<div class="footer">
  <p>三星堆文物介绍 | 探秘古蜀文明</p >
</div>
<script>
document.getElementById("submitBtn").onclick=function(){
  var name=document.getElementById("name").value.trim();
  var comment=document.getElementById("comment").value.trim();
  if(name=="") alert("请填写姓名");
  else if(comment=="") alert("请填写感想");
  else alert("留言提交成功！感谢探秘三星堆");
};
$(function(){
  $(".nav a").click(function(e){
    var href=$(this).attr("href");
    if(href=="#intro"||href=="#form"){
      e.preventDefault();
      $("html,body").animate({scrollTop:$(href).offset().top-70},400);
    }else if(href=="#"){
      e.preventDefault();
      $("html,body").animate({scrollTop:0},400);
    }
  });
});
</script>
</body>
</html>
